const { w:IW, h:IH, palette:PAL, rows:ROWS } = DATA;

const rgb = PAL.map(h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]);

const off = document.createElement('canvas');
off.width = IW; off.height = IH;
const offCtx = off.getContext('2d');
const imgData = offCtx.createImageData(IW, IH);
const buf = imgData.data;
let p = 0;
for (let y = 0; y < ROWS.length; y++){
  const segs = ROWS[y];
  for (let s = 0; s < segs.length; s++){
    const c = rgb[segs[s][0]], run = segs[s][1];
    for (let k = 0; k < run; k++){
      const o = p * 4;
      buf[o]=c[0]; buf[o+1]=c[1]; buf[o+2]=c[2]; buf[o+3]=255;
      p++;
    }
  }
}
offCtx.putImageData(imgData, 0, 0);

const canvas = document.getElementById('art');
const ctx = canvas.getContext('2d');

function fit(){
  const vh = window.innerHeight, vw = window.innerWidth;
  let s = vh / IH;
  if (IW * s > vw) s = vw / IW;
  const dpr = window.devicePixelRatio || 1;
  const cssW = IW * s, cssH = IH * s;

  canvas.style.width  = vw + 'px';
  canvas.style.height = vh + 'px';
  const cw = Math.round(vw * dpr), ch = Math.round(vh * dpr);
  canvas.width = cw;
  canvas.height = ch;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, cw, ch);

  const tileWd = cssW * dpr, tileHd = cssH * dpr;
  const centerLeftD = (cw - tileWd) / 2;
  const centerTopD  = (ch - tileHd) / 2;

  const leftCount  = Math.ceil(Math.max(centerLeftD, 0) / tileWd);
  const rightSpace = cw - (centerLeftD + tileWd);
  const rightCount = Math.ceil(Math.max(rightSpace, 0) / tileWd);
  const upCount    = Math.ceil(Math.max(centerTopD, 0) / tileHd);
  const downSpace  = ch - (centerTopD + tileHd);
  const downCount  = Math.ceil(Math.max(downSpace, 0) / tileHd);

  for (let ty = -upCount; ty <= downCount + 1; ty++){
    const y0 = Math.round(centerTopD + ty * tileHd);
    const y1 = Math.round(centerTopD + (ty + 1) * tileHd);
    const h  = y1 - y0;
    if (y0 > ch || y1 < 0) continue;
    for (let tx = -leftCount; tx <= rightCount + 1; tx++){
      const x0 = Math.round(centerLeftD + tx * tileWd);
      const x1 = Math.round(centerLeftD + (tx + 1) * tileWd);
      const w  = x1 - x0;
      if (x0 > cw || x1 < 0) continue;
      ctx.drawImage(off, 0, 0, IW, IH, x0, y0, w, h);
    }
  }
}
window.addEventListener('resize', fit);
fit();
